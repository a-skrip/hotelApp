<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>Список отелей</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2>Список отелей</h2>

    <!-- Форма добавления отеля -->
    <div class="card mb-4">
        <div class="card-header">
            <h3 class="card-title">Добавить новый отель</h3>
        </div>
        <div class="card-body">
            <form action="/api/v1/hotels" method="post">
                <div class="row">
                    <div class="col-md-4">
                        <div class="mb-3">
                            <label for="name" class="form-label">Название отеля</label>
                            <input type="text" class="form-control" id="name" name="name" required>
                        </div>
                    </div>
                    <div class="col-md-2">
                        <div class="mb-3">
                            <label for="stars" class="form-label">Количество звезд</label>
                            <input type="number" class="form-control" id="stars" name="stars" min="1" max="5" required>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label for="description" class="form-label">Описание</label>
                            <textarea class="form-control" id="description" name="description" rows="1"></textarea>
                        </div>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">Добавить отель</button>
            </form>
        </div>
    </div>

    <!-- Таблица отелей -->
    <table class="table table-striped">
        <thead>
        <tr>
            <th>ID</th>
            <th>Название</th>
            <th>Звезды</th>
            <th>Действия</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="hotel : ${hotels}">
            <td th:text="${hotel.id}">1</td>
            <td th:text="${hotel.name}">Отель</td>
            <td>
                <span th:each="i : ${#numbers.sequence(1, hotel.stars)}">★</span>
                <span th:each="i : ${#numbers.sequence(hotel.stars + 1, 5)}">☆</span>
                <span th:text="' (' + ${hotel.stars} + ')'"></span>
            </td>
            <td>
                <a th:href="@{/api/v1/hotels/{id}(id=${hotel.id})}" class="btn btn-info btn-sm">Просмотр</a>
                <button th:onclick="'deleteHotel(' + ${hotel.id} + ')'" class="btn btn-danger btn-sm">Удалить</button>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function deleteHotel(id) {
        if (confirm('Вы уверены, что хотите удалить этот отель?')) {
            fetch('/api/v1/hotels/' + id, {
                method: 'DELETE'
            }).then(response => {
                if (response.ok) {
                    window.location.reload();
                } else {
                    alert('Ошибка при удалении отеля');
                }
            }).catch(error => {
                console.error('Error:', error);
                alert('Ошибка при удалении отеля');
            });
        }
    }
</script>
</body>
</html>
